name: Build

on:
  push:
    branches: [ main ]
    
jobs:

  build4win:
   
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python "3.11"
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyinstaller-hooks-contrib
        pip install setuptools
        pip install -r requirements.txt

    - name: build exe
      run: |
        python -m PyInstaller --onefile main.py
    
    - uses: actions/upload-artifact@v3
      with:
        name: windowsexe
        path: dist/main.exe
        if-no-files-found: error
        retention-days: 1


  build4arch:
  
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install --no-install-recommends -y base-devel python3 python3-pip

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Makepkg Build and Check
      id: makepkg
      uses: edlanglois/pkgbuild-action@v1

    - name: Publish package
      uses: actions/upload-artifact@v2
      with:
        name: Plan-Imageconverter.pkg.tar.zst  # Adjust package name as needed
        path: ${{ steps.makepkg.outputs.pkgfile0 }}
        
  
  publish:

    needs: [build4win, build4arch]
    
    runs-on: ubuntu-latest
    
    steps:
  
    - uses: dev-drprasad/delete-tag-and-release@v0.2.1
      with:
        tag_name: Releases
        delete_release: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - uses: actions/checkout@v3
    
    - uses: actions/download-artifact@v3
      with:
        name: windowsexe

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@2.7.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: main.exe
        asset_name: Plan-ImageConverter.exe
        tag: Releases
        body: "Binaries are Below"

    - uses: actions/download-artifact@v3
      with:
        name: Plan-Imageconverter.pkg.tar.zst

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@2.7.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: Plan-Imageconverter.pkg.tar.zst
        asset_name: Plan-Imageconverter.pkg.tar.zst
        tag: Releases
