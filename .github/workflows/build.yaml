name: Build

on:
  push:
    branches: [ main ]
    
jobs:

  build4win:
   
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python "3.11"
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyinstaller-hooks-contrib
        pip install setuptools
        pip install -r requirements.txt

    - name: build exe
      run: |
        python -m PyInstaller --onefile main.py
    
    - uses: actions/upload-artifact@v3
      with:
        name: windowsexe
        path: dist/main.exe
        if-no-files-found: error
        retention-days: 1


  builddeb:
  
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev

    - name: Create package directory
      run: |
        mkdir -p package_dir/DEBIAN
        mkdir -p package_dir/usr/bin 

    - name: Copy Python script to package directory
      run: |
        cp main.py package_dir/usr/bin

    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install -r requirements.txt --target=package_dir/usr/lib/python3/dist-packages

    - name: Create control file
      run: |
        echo "Package: your-package-name" > package_dir/DEBIAN/control
        echo "Version: 1.0.0" >> package_dir/DEBIAN/control  # Adjust version as needed
        echo "Architecture: all" >> package_dir/DEBIAN/control
        echo "Maintainer: Your Name <your.email@example.com>" >> package_dir/DEBIAN/control
        echo "Description: Your package description" >> package_dir/DEBIAN/control
        echo "Depends: python3" >> package_dir/DEBIAN/control  # Add Python dependency

    - name: Set permissions
      run: |
        chmod -R 755 package_dir

    - name: Build DEB package
      run: |
        dpkg-deb --build package_dir

    - name: Move DEB file to artifacts directory
      run: |
        mv package_dir.deb Plan-Imageconverter.deb

    - name: Upload DEB package
      uses: actions/upload-artifact@v3
      with:
        name: Plan-Imageconverter.deb
        path: Plan-Imageconverter.deb
        
  
  publish:

    needs: [build4win, builddeb]
    
    runs-on: ubuntu-latest
    
    steps:
  
    - uses: dev-drprasad/delete-tag-and-release@v0.2.1
      with:
        tag_name: Releases
        delete_release: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - uses: actions/checkout@v3
    
    - uses: actions/download-artifact@v3
      with:
        name: windowsexe

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@2.7.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: main.exe
        asset_name: Plan-ImageConverter.exe
        tag: Releases
        body: "Binaries are Below"

    - uses: actions/download-artifact@v3
      with:
        name: Plan-Imageconverter.deb

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@2.7.0
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: Plan-Imageconverter.deb
        asset_name: Plan-Imageconverter.deb
        tag: Releases
